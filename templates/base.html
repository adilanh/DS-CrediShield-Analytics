<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CrediShield Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-200">
    <div class="flex min-h-screen">
      <aside class="hidden w-72 shrink-0 border-r border-slate-800 bg-slate-900 lg:flex lg:flex-col">
        <div class="border-b border-slate-800 px-6 py-5">
          <div class="text-lg font-semibold tracking-tight text-slate-100">CrediShield Analytics</div>
          <p class="mt-1 text-sm text-slate-400">Dashboard prediksi kartu kredit</p>
        </div>

        <nav class="flex-1 px-4 py-5 space-y-1">
          <a href="/" class="flex items-center rounded-xl px-4 py-3 text-sm font-medium {{ 'bg-slate-800 text-white border-l-4 border-indigo-500 shadow-md' if request.path == '/' else 'text-slate-400 border-l-4 border-transparent hover:bg-slate-800 hover:text-white' }}">Beranda</a>

          <a href="/dashboard" class="flex items-center rounded-xl px-4 py-3 text-sm font-medium {{ 'bg-slate-800 text-white border-l-4 border-indigo-500 shadow-md' if request.path == '/dashboard' else 'text-slate-400 border-l-4 border-transparent hover:bg-slate-800 hover:text-white' }}">Dashboard</a>

          <a href="/prediksi" class="flex items-center rounded-xl px-4 py-3 text-sm font-medium {{ 'bg-slate-800 text-white border-l-4 border-indigo-500 shadow-md' if request.path == '/prediksi' else 'text-slate-400 border-l-4 border-transparent hover:bg-slate-800 hover:text-white' }}">Prediksi</a>
        </nav>
      </aside>

      <div class="flex min-w-0 flex-1 flex-col">
        <header class="border-b border-slate-800 bg-slate-900 lg:hidden">
          <div class="px-4 py-4">
            <div class="text-lg font-semibold tracking-tight text-slate-100">CrediShield Analytics</div>
          </div>
        </header>

        <main class="flex-1 flex flex-col min-h-screen bg-slate-950 p-8">
          <div class="flex-grow">
            {% block content %}{% endblock %}
          </div>
          <footer class="mt-12 text-center text-slate-600 text-sm">
            © 2026 CrediShield Analytics - Universitas Lampung
          </footer>
        </main>
      </div>
    </div>
  </body>
</html>
