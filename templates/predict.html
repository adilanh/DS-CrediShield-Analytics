{% extends 'base.html' %}

{% block content %}
  <div class="mx-auto max-w-2xl">
    <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold text-gray-800">Prediksi</h1>
      <p class="mt-2 text-sm text-gray-500">Masukkan nilai fitur untuk melihat hasil prediksi.</p>

      <form method="post" class="mt-6 space-y-5">
        <div>
          <label for="feature" class="mb-2 block text-sm font-medium text-gray-700">Feature (numeric)</label>
          <input id="feature" name="feature" type="number" step="0.01" class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-gray-800 outline-none transition focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100" placeholder="0.0" value="{{ input_val if input_val is not none else '' }}">
        </div>

        <button class="inline-flex items-center rounded-xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700">
          Submit Prediksi
        </button>
      </form>

      {% if result %}
        <div class="mt-6 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
          <div class="text-sm text-gray-500">Hasil</div>
          <div class="mt-2 text-lg font-semibold text-gray-800">{{ result.label }}</div>
          <div class="mt-1 text-sm text-gray-600">Score: {{ result.score }}</div>
        </div>
      {% endif %}
    </div>
  </div>
{% endblock %}
